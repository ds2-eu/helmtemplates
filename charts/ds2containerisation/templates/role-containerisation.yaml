apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: containerisation-role
rules:
  # Deployments (apps)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]


  # Pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]


  # Services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]


  # ServiceAccounts
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]


---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: containerisation-rolebinding
subjects:
  - kind: ServiceAccount
    name: {{ .Values.app.name }}-serviceaccount
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: containerisation-role
  apiGroup: rbac.authorization.k8s.io
