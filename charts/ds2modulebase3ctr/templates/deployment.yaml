apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }} 
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.app.name }} 
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }} 
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }} 
    spec:
{{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.app.name }}-serviceaccount
{{- end }}
{{- if .Values.ndots.enabled }}
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
        - name: ndots
          value: "1"
{{- end }}
      containers:
      - name: {{ .Values.app.name }}
        image: {{ template "imageURL" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }} 
        ports:
        - name: http 
          containerPort: {{ .Values.app.port }}
        {{- if .Values.resourcesEnabled }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        {{- end }} 
{{- if .Values.app.env }}
        envFrom:
        - configMapRef:
            name: {{ .Values.app.name }}-configmap
{{- end }}
        volumeMounts:
        - name: ctr-sock
          mountPath: /run/k3s/containerd
      {{- if .Values.persistence.enabled }}
      #volumeMounts:
        - name: {{ .Values.app.name }}-volumedata
          mountPath: {{ .Values.persistence.mountpath | quote }}
      {{- end }}
      volumes:
        - name: ctr-sock
          hostPath:
            path: /run/k3s/containerd
      {{- if .Values.persistence.enabled }}
        - name: {{ .Values.app.name }}-volumedata
          persistentVolumeClaim:
            claimName: {{ .Values.app.name }}-pvc
        {{- end }}
{{- if .Values.image.privateRegistry.enabled }}
      imagePullSecrets:
      - name: {{ .Values.app.name }}-imagepullsecret
{{- end }}

