{{- if .Values.vault.initjob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.vault.app.name }}-job-vault-delete-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Values.vault.app.name }}-serviceaccount
      containers:
      - name: delete-secret
        image: bitnami/kubectl:latest
        command:
          - /bin/sh
          - -c
          - |
            echo "Deleting secret..."
            kubectl delete secret vault-root-token-secret --ignore-not-found -n {{ .Release.Namespace }}
{{- end }}
