apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.vault.app.name }}-role
  namespace: {{ .Release.namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods","secrets"]
    verbs: ["get", "list", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.vault.app.name }}-rolebinding
  namespace: {{ .Release.namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.vault.app.name }}-serviceaccount
roleRef:
  kind: Role
  name: {{ .Values.vault.app.name }}-role
  apiGroup: rbac.authorization.k8s.io
